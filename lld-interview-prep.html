<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LLD Interview Prep</title>
<link rel="stylesheet" href="shared-guides.css">
<script src="data.js" defer></script>
<script src="assistant.js" defer></script>
<script src="shared-guides.js" defer></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent1: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --accent4: #f9c74f;
    --text: #e8e8f0;
    --muted: #888899;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  /* BACK BUTTON */
  .back-to-dashboard {
    position: fixed;
    top: 15px;
    left: 20px;
    z-index: 9999;
    padding: 8px 16px;
    background: var(--accent, #7c5cfc);
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    font-family: sans-serif;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    transition: transform 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .back-to-dashboard:hover {
    transform: translateY(-2px);
    background: #5d45d1;
  }
  
  @media (max-width: 900px) {
    .back-to-dashboard {
      top: 8px;
      left: 10px;
      padding: 6px 12px;
      font-size: 11px;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-head);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.35;
  }

  /* HERO */
  .hero {
    position: relative;
    padding: 60px 40px 40px;
    text-align: center;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(108,99,255,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 16px;
  }
  .hero h1 {
    font-size: clamp(2rem, 5vw, 3.8rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #fff 30%, var(--accent1) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-sub {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  /* TABS */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 24px 40px 0;
    flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 10px 22px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .tab-btn .dot { width: 8px; height: 8px; border-radius: 50%; }
  .tab-btn:hover { border-color: var(--accent1); color: var(--text); }
  .tab-btn.active { background: var(--accent1); border-color: var(--accent1); color: #fff; }
  .tab-btn.active .dot { background: rgba(255,255,255,0.6); }

  /* MAIN */
  .main { padding: 32px 40px 60px; max-width: 1200px; margin: 0 auto; }

  /* SECTION */
  .section { display: none; animation: fadeUp 0.35s ease; }
  .section.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-size: 13px;
    font-family: var(--font-mono);
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

  /* CARD */
  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
    background: var(--card-accent, var(--accent1));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .card:hover::before { opacity: 1; }
  .card:hover { border-color: var(--card-accent, var(--accent1)); }

  .card-icon { font-size: 28px; margin-bottom: 12px; }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .card-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--card-accent, var(--accent1));
    margin-bottom: 10px;
  }
  .card-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .card-tag {
    display: inline-block;
    margin-top: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-family: var(--font-mono);
    background: rgba(255,255,255,0.05);
    color: var(--muted);
  }

  /* PATTERN CATEGORY HEADERS */
  .cat-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 36px 0 18px;
  }
  .cat-header:first-of-type { margin-top: 0; }
  .cat-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    font-weight: 700;
  }
  .cat-pill.creational  { background: rgba(108,99,255,0.15); color: var(--accent1); border: 1px solid rgba(108,99,255,0.3); }
  .cat-pill.structural  { background: rgba(67,233,123,0.12); color: var(--accent3); border: 1px solid rgba(67,233,123,0.3); }
  .cat-pill.behavioral  { background: rgba(255,101,132,0.12); color: var(--accent2); border: 1px solid rgba(255,101,132,0.3); }
  .cat-count {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }
  .cat-line { flex: 1; height: 1px; background: var(--border); }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(6px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    max-width: 640px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 36px;
    position: relative;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-close {
    position: absolute; top: 18px; right: 18px;
    background: var(--border); border: none;
    color: var(--muted); font-size: 18px;
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .modal-close:hover { background: var(--accent2); color: #fff; }
  .modal-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 8px;
  }
  .modal h2 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .modal-intent {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .modal-section { margin-top: 20px; }
  .modal-section h3 {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent3);
    margin-bottom: 10px;
  }
  .modal-section p, .modal-section li {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
  }
  .modal-section ul { padding-left: 18px; }
  .modal-section li { margin-bottom: 6px; }
  .code-block {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: #a8b5c8;
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre;
    margin-top: 10px;
  }
  .kw { color: var(--accent1); }
  .cm { color: #555; font-style: italic; }
  .st { color: var(--accent3); }
  .cl { color: var(--accent4); }

  /* PROGRESS BAR */
  .stat-bar { display: flex; gap: 16px; justify-content: center; margin: 20px 0 0; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-num { font-size: 28px; font-weight: 800; }
  .stat-lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .hero { padding: 40px 20px 24px; }
    .main { padding: 24px 16px 40px; }
    .tabs { padding: 16px 16px 0; }
  }
</style>
</head>
<body>


<!-- HERO -->
<div class="hero">
  <div class="hero-label">// interview prep</div>
  <h1>Low Level Design</h1>
  <p class="hero-sub">OOP Concepts · Design Principles · 23 Design Patterns</p>
  <div class="stat-bar">
    <div class="stat"><div class="stat-num" style="color:var(--accent1)">8</div><div class="stat-lbl">OOP Concepts</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--accent4)">10</div><div class="stat-lbl">Principles</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--accent2)">23</div><div class="stat-lbl">Design Patterns</div></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('oop')" id="tab-oop">
    <span class="dot" style="background:var(--accent1)"></span> OOP Concepts
  </button>
  <button class="tab-btn" onclick="showTab('principles')" id="tab-principles">
    <span class="dot" style="background:var(--accent4)"></span> Design Principles
  </button>
  <button class="tab-btn" onclick="showTab('patterns')" id="tab-patterns">
    <span class="dot" style="background:var(--accent2)"></span> Design Patterns
  </button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- OOP SECTION -->
  <div class="section active" id="sec-oop">
    <div class="section-title">// core oop concepts</div>
    <div class="grid" id="oop-grid"></div>
  </div>

  <!-- PRINCIPLES SECTION -->
  <div class="section" id="sec-principles">
    <div class="section-title">// design principles</div>
    <div class="grid-2" id="principles-grid"></div>
  </div>

  <!-- PATTERNS SECTION -->
  <div class="section" id="sec-patterns">
    <div class="section-title">// gang of four — 23 patterns</div>
    <div id="patterns-container"></div>
  </div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-label" id="m-label"></div>
    <h2 id="m-title"></h2>
    <p class="modal-intent" id="m-intent"></p>
    <div id="m-body"></div>
  </div>
</div>

<script>
const OOP = [
  {
    icon: "🔒", title: "Encapsulation",
    sub: "Data Hiding",
    accent: "#6c63ff",
    tag: "Fundamental",
    desc: "Bundling data and methods that operate on it within a class, restricting direct access from outside.",
    detail: "Encapsulation binds together the data and functions that manipulate the data, keeping both safe from outside interference and misuse.",
    keyPoints: ["Use private/protected fields", "Expose via getters/setters", "Prevents invalid state", "Improves maintainability"],
    example: `<span class="kw">class</span> <span class="cl">BankAccount</span> {
  <span class="kw">private</span> balance: <span class="kw">number</span> = <span class="st">0</span>;

  deposit(amount: <span class="kw">number</span>) {
    <span class="kw">if</span> (amount > <span class="st">0</span>) <span class="kw">this</span>.balance += amount;
  }

  getBalance(): <span class="kw">number</span> {
    <span class="kw">return this</span>.balance; <span class="cm">// read-only access</span>
  }
}`
  },
  {
    icon: "🧬", title: "Inheritance",
    sub: "IS-A Relationship",
    accent: "#43e97b",
    tag: "Fundamental",
    desc: "A class (child) acquires properties and behaviors of another class (parent), enabling code reuse.",
    detail: "Inheritance establishes a parent-child relationship between classes. The child class inherits all non-private members and can override or extend them.",
    keyPoints: ["Promotes code reuse", "Establishes IS-A relationship", "Supports method overriding", "Use carefully — prefer composition"],
    example: `<span class="kw">class</span> <span class="cl">Animal</span> {
  speak() { <span class="kw">return</span> <span class="st">"..."</span>; }
}

<span class="kw">class</span> <span class="cl">Dog</span> <span class="kw">extends</span> <span class="cl">Animal</span> {
  speak() { <span class="kw">return</span> <span class="st">"Woof!"</span>; }
}

<span class="kw">class</span> <span class="cl">Cat</span> <span class="kw">extends</span> <span class="cl">Animal</span> {
  speak() { <span class="kw">return</span> <span class="st">"Meow!"</span>; }
}`
  },
  {
    icon: "🎭", title: "Polymorphism",
    sub: "Many Forms",
    accent: "#ff6584",
    tag: "Fundamental",
    desc: "The ability for objects of different classes to be treated as instances of a common base class.",
    detail: "Polymorphism means 'many forms'. It allows a single interface to represent different underlying data types. Two key types: compile-time (overloading) and runtime (overriding).",
    keyPoints: ["Runtime polymorphism via overriding", "Compile-time via overloading", "Enables open/closed principle", "Core of design patterns"],
    example: `<span class="kw">class</span> <span class="cl">Shape</span> {
  area(): <span class="kw">number</span> { <span class="kw">return</span> <span class="st">0</span>; }
}
<span class="kw">class</span> <span class="cl">Circle</span> <span class="kw">extends</span> <span class="cl">Shape</span> {
  area() { <span class="kw">return</span> Math.PI * r * r; }
}
<span class="kw">const</span> shapes: <span class="cl">Shape</span>[] = [<span class="kw">new</span> <span class="cl">Circle</span>()];
shapes.forEach(s => s.area()); <span class="cm">// polymorphic call</span>`
  },
  {
    icon: "🎨", title: "Abstraction",
    sub: "Hide Complexity",
    accent: "#f9c74f",
    tag: "Fundamental",
    desc: "Hiding internal implementation details and exposing only what is necessary through interfaces.",
    detail: "Abstraction lets you focus on WHAT an object does instead of HOW it does it. Achieved via abstract classes and interfaces.",
    keyPoints: ["Abstract classes / interfaces", "Hides implementation detail", "Reduces complexity", "Enables loose coupling"],
    example: `<span class="kw">interface</span> <span class="cl">PaymentGateway</span> {
  pay(amount: <span class="kw">number</span>): <span class="kw">boolean</span>;
}
<span class="kw">class</span> <span class="cl">Stripe</span> <span class="kw">implements</span> <span class="cl">PaymentGateway</span> {
  pay(amount) { <span class="cm">/* Stripe logic */</span> }
}
<span class="kw">class</span> <span class="cl">PayPal</span> <span class="kw">implements</span> <span class="cl">PaymentGateway</span> {
  pay(amount) { <span class="cm">/* PayPal logic */</span> }
}`
  },
  {
    icon: "🔗", title: "Association",
    sub: "HAS-A Relationship",
    accent: "#4cc9f0",
    tag: "Relationship",
    desc: "A relationship between objects where one object uses or interacts with another.",
    detail: "Association represents a relationship where objects can exist independently. Types: Aggregation (weak HAS-A) and Composition (strong HAS-A).",
    keyPoints: ["Objects are independent", "Aggregation: weak ownership", "Composition: strong ownership", "UML: lines and diamonds"],
    example: `<span class="cm">// Aggregation — Teacher has Students</span>
<span class="kw">class</span> <span class="cl">Teacher</span> {
  students: <span class="cl">Student</span>[] = [];
}
<span class="cm">// Composition — House has Rooms</span>
<span class="kw">class</span> <span class="cl">House</span> {
  <span class="kw">private</span> rooms = [<span class="kw">new</span> <span class="cl">Room</span>()]; <span class="cm">// Room can't exist alone</span>
}`
  },
  {
    icon: "📦", title: "Composition",
    sub: "Over Inheritance",
    accent: "#f3722c",
    tag: "Relationship",
    desc: "Building complex objects by combining simpler ones. Preferred over inheritance for flexibility.",
    detail: "Composition over inheritance is a key design principle. Instead of extending a class, hold a reference to it. Leads to more flexible and testable code.",
    keyPoints: ["Favor has-a over is-a", "More flexible than inheritance", "Easier to test with mocks", "Follows Single Responsibility"],
    example: `<span class="kw">class</span> <span class="cl">Logger</span> {
  log(msg: <span class="kw">string</span>) { console.log(msg); }
}
<span class="kw">class</span> <span class="cl">UserService</span> {
  <span class="kw">private</span> logger = <span class="kw">new</span> <span class="cl">Logger</span>();
  createUser(name: <span class="kw">string</span>) {
    <span class="kw">this</span>.logger.log(<span class="st">\`Creating \${name}\`</span>);
  }
}`
  },
  {
    icon: "🖇️", title: "Coupling & Cohesion",
    sub: "Design Quality",
    accent: "#90e0ef",
    tag: "Design Quality",
    desc: "Coupling = dependency between modules. Cohesion = how related responsibilities within a module are.",
    detail: "Low coupling means modules are independent. High cohesion means a module has a single, clear purpose. Aim for LOW coupling + HIGH cohesion.",
    keyPoints: ["Low coupling = easy to change", "High cohesion = clear purpose", "Use interfaces to reduce coupling", "Related to SRP principle"],
    example: `<span class="cm">// HIGH coupling (BAD)</span>
<span class="kw">class</span> <span class="cl">OrderService</span> {
  db = <span class="kw">new</span> <span class="cl">MySQLDatabase</span>(); <span class="cm">// tightly coupled</span>
}
<span class="cm">// LOW coupling (GOOD)</span>
<span class="kw">class</span> <span class="cl">OrderService</span> {
  <span class="kw">constructor</span>(<span class="kw">private</span> db: <span class="cl">IDatabase</span>) {}
}`
  },
  {
    icon: "🔄", title: "Interfaces vs Abstract",
    sub: "Contract Design",
    accent: "#c77dff",
    tag: "Core Concept",
    desc: "Interface defines a contract (what). Abstract class provides partial implementation (what + some how).",
    detail: "Key interview topic. Interface: all abstract, no state, can implement multiple. Abstract class: can have state + implementation, single inheritance.",
    keyPoints: ["Interface = pure contract", "Abstract = partial blueprint", "Multiple interface implementation", "Use interface for polymorphism"],
    example: `<span class="kw">interface</span> <span class="cl">Flyable</span> { fly(): <span class="kw">void</span>; }
<span class="kw">interface</span> <span class="cl">Swimmable</span> { swim(): <span class="kw">void</span>; }

<span class="kw">abstract class</span> <span class="cl">Bird</span> {
  <span class="kw">abstract</span> makeSound(): <span class="kw">void</span>;
  breathe() { <span class="cm">/* shared impl */</span> }
}
<span class="kw">class</span> <span class="cl">Duck</span> <span class="kw">extends</span> <span class="cl">Bird</span>
  <span class="kw">implements</span> <span class="cl">Flyable</span>, <span class="cl">Swimmable</span> { }`
  }
];

const PRINCIPLES = [
  { icon:"🔵", title:"Single Responsibility", sub:"SRP · SOLID[S]", accent:"#6c63ff", tag:"SOLID",
    desc:"A class should have only ONE reason to change — one responsibility.",
    detail:"If a class handles too many concerns, it becomes fragile. Split concerns into separate classes.",
    keyPoints:["One class, one job","Smaller, focused classes","Easier to test","Reduce side effects"],
    example:`<span class="cm">// BAD: two responsibilities</span>\n<span class="kw">class</span> <span class="cl">User</span> {\n  saveToDatabase() {}\n  sendWelcomeEmail() {}\n}\n<span class="cm">// GOOD: separated</span>\n<span class="kw">class</span> <span class="cl">UserRepository</span> { saveToDatabase() {} }\n<span class="kw">class</span> <span class="cl">EmailService</span> { sendWelcomeEmail() {} }` },

  { icon:"🟢", title:"Open / Closed", sub:"OCP · SOLID[O]", accent:"#43e97b", tag:"SOLID",
    desc:"Open for extension, closed for modification. Add new behavior without changing existing code.",
    detail:"Use abstraction (interfaces/abstract classes) to allow new behaviors to be plugged in without modifying existing code.",
    keyPoints:["Extend via new classes","Don't edit existing code","Use strategy/polymorphism","Prevents regressions"],

    <div class="card-desc">${item.desc}</div>
    <span class="card-tag">${item.tag}</span>`;
  c.onclick = () => openModal(item, 'OOP Concept');
  oopGrid.appendChild(c);
});

// ============ RENDER PRINCIPLES ============
const princGrid = document.getElementById('principles-grid');
PRINCIPLES.forEach((item) => {
  const c = document.createElement('div');
  c.className = 'card';
  c.style.setProperty('--card-accent', item.accent);
  c.innerHTML = `<div class="card-icon">${item.icon}</div>
    <div class="card-sub">${item.sub}</div>
    <div class="card-title">${item.title}</div>
    <div class="card-desc">${item.desc}</div>
    <span class="card-tag">${item.tag}</span>`;
  c.onclick = () => openModal(item, 'Design Principle');
  princGrid.appendChild(c);
});

// ============ RENDER PATTERNS ============
const patternsCont = document.getElementById('patterns-container');
['creational','structural','behavioral'].forEach(cat => {
  const data = PATTERNS[cat];
  // Header
  const header = document.createElement('div');
  header.className = 'cat-header';
  header.innerHTML = `
    <span class="cat-pill ${cat}">${data.label}</span>
    <span class="cat-count">${data.count} patterns</span>
    <div class="cat-line"></div>`;
  patternsCont.appendChild(header);
  // Grid
  const grid = document.createElement('div');
  grid.className = 'grid';
  data.items.forEach(item => {
    const c = document.createElement('div');
    c.className = 'card';
    c.style.setProperty('--card-accent', data.color);
    c.innerHTML = `<div class="card-icon">${item.icon}</div>
      <div class="card-sub">${item.tag}</div>
      <div class="card-title">${item.title}</div>
      <div class="card-desc">${item.desc}</div>
      <span class="card-tag">${data.label}</span>`;
    c.onclick = () => openModal(item, `${data.label} Pattern`);
    grid.appendChild(c);
  });
  patternsCont.appendChild(grid);
});

// ============ TABS ============
function showTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

// ============ MODAL ============
function openModal(item, category) {
  document.getElementById('m-label').textContent = `// ${category}`;
  document.getElementById('m-title').innerHTML = `${item.icon} ${item.title}`;
  document.getElementById('m-intent').textContent = item.detail;
  document.getElementById('m-body').innerHTML = `
    <div class="modal-section">
      <h3>Key Points</h3>
      <ul>${item.keyPoints.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>
    <div class="modal-section">
      <h3>Code Example</h3>
      <div class="code-block">${item.example}</div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
