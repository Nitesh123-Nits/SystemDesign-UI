<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apache Cassandra Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #050810;
    font-family: 'Space Mono', monospace;
    color: #ccd6f6;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  #bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  header {
    position: relative;
    z-index: 5;
    border-bottom: 1px solid rgba(0,212,255,0.12);
    padding: 18px 32px;
    background: rgba(5,8,16,0.9);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #00D4FF22, #A855F722);
    border: 1px solid #00D4FF44;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 18px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: #fff;
  }

  .header-sub {
    font-size: 10px;
    color: #00D4FF99;
    letter-spacing: 0.12em;
    margin-top: 1px;
  }

  .status-dots {
    margin-left: auto;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22C55E33;
    transition: background 0.3s;
  }
  .dot.active { background: #22C55E; }

  .status-label {
    font-size: 9px;
    color: #22C55E88;
    margin-left: 6px;
    letter-spacing: 0.1em;
  }

  main {
    flex: 1;
    display: flex;
    position: relative;
    z-index: 1;
    min-height: 600px;
  }

  #diagram {
    flex: 0 0 55%;
    position: relative;
    border-right: 1px solid rgba(0,212,255,0.1);
  }

  .section-label {
    position: absolute;
    left: 4%;
    font-size: 8px;
    letter-spacing: 0.2em;
    border-left-width: 2px;
    border-left-style: solid;
    padding-left: 6px;
    z-index: 2;
  }

  .h-divider {
    position: absolute;
    left: 4%; right: 4%;
    border-top: 1px dashed rgba(255,255,255,0.06);
    z-index: 1;
  }

  #svg-arrows {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .node-card {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
  }

  .node-inner {
    background: rgba(10,12,20,0.85);
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 120px;
    text-align: center;
    backdrop-filter: blur(8px);
    transition: all 0.25s ease;
    border-width: 1.5px;
    border-style: solid;
  }

  .node-icon {
    font-size: 20px;
    margin-bottom: 3px;
    transition: filter 0.25s;
  }

  .node-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1.3;
    transition: color 0.25s;
  }

  /* Detail panel */
  #detail-panel {
    flex: 1;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  .detail-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .detail-icon-box {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    border-width: 1.5px;
    border-style: solid;
  }

  .detail-name {
    font-size: 16px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    letter-spacing: 0.04em;
  }

  .detail-sub {
    font-size: 9px;
    color: #ffffff44;
    letter-spacing: 0.15em;
    margin-top: 2px;
  }

  .detail-divider {
    width: 100%;
    height: 1px;
    margin-top: 4px;
  }

  #detail-description {
    font-size: 12px;
    line-height: 1.85;
    color: #a8b8d8;
    letter-spacing: 0.01em;
  }

  .chars-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    margin-bottom: 10px;
  }

  #detail-chars {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .char-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 7px;
    font-size: 11px;
    color: #ccd6f6;
    line-height: 1.5;
    border-width: 1px;
    border-style: solid;
  }

  .char-arrow { font-size: 10px; flex-shrink: 0; margin-top: 1px; }

  .connections-label {
    font-size: 9px;
    color: #ffffff44;
    letter-spacing: 0.2em;
    margin-bottom: 8px;
  }

  #detail-connections {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .conn-chip {
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 10px;
    cursor: pointer;
    border-width: 1px;
    border-style: solid;
    transition: all 0.2s;
    font-family: 'Space Mono', monospace;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #ffffff22;
    text-align: center;
    gap: 12px;
    font-size: 11px;
    letter-spacing: 0.2em;
  }

  footer {
    position: relative;
    z-index: 5;
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 10px 32px;
    background: rgba(5,8,16,0.8);
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .legend-label {
    font-size: 9px;
    color: #ffffff55;
    letter-spacing: 0.1em;
  }

  .footer-hint {
    margin-left: auto;
    font-size: 9px;
    color: #ffffff22;
    letter-spacing: 0.1em;
  }

  /* Unified SystemDesign.Pro Theme Injection */
  :root {
    --bg: #050512 !important;
    --surface: #0a0a20 !important;
    --border: rgba(255,255,255,0.1) !important;
    --text: #e0e0e0 !important;
    --text-muted: #a0a0b0 !important;
    --accent: #7c5cfc !important;
    --neon-cyan: #00f0ff !important;
  }
  body { background-color: var(--bg) !important; color: var(--text) !important; }
  .back-to-dashboard {
    position: fixed; top: 20px; left: 20px; z-index: 9999;
    background: var(--accent); color: white; padding: 10px 20px;
    border-radius: 8px; text-decoration: none; font-weight: bold;
    font-family: sans-serif; box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    transition: transform 0.2s;
  }

</style>
</head>
<body>
<a href="index.html" class="back-to-dashboard">← Back to Dashboard</a>


<div id="bg-grid"></div>

<header>
  <div class="header-icon">⬡</div>
  <div>
    <div class="header-title">Apache Cassandra</div>
    <div class="header-sub">DISTRIBUTED ARCHITECTURE · INTERACTIVE FLOW</div>
  </div>
  <div class="status-dots">
    <div class="dot active" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <span class="status-label">CLUSTER ACTIVE</span>
  </div>
</header>

<main>
  <div id="diagram">
    <!-- Section labels -->
    <div class="section-label" style="top:4%;color:#00D4FF66;border-color:#00D4FF33">APPLICATION LAYER</div>
    <div class="section-label" style="top:38%;color:#F59E0B66;border-color:#F59E0B33">CLUSTER LAYER</div>
    <div class="section-label" style="top:76%;color:#EF444466;border-color:#EF444433">STORAGE LAYER</div>

    <!-- Dividers -->
    <div class="h-divider" style="top:34%"></div>
    <div class="h-divider" style="top:72%"></div>

    <!-- SVG arrows -->
    <svg id="svg-arrows" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>

    <!-- Nodes injected by JS -->
  </div>

  <div id="detail-panel">
    <div class="empty-state">
      <div style="font-size:40px">⬡</div>
      <div>SELECT A COMPONENT</div>
    </div>
  </div>
</main>

<footer>
  <div class="legend-item"><div class="legend-dot" style="background:#00D4FF"></div><span class="legend-label">Application</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div><span class="legend-label">Cluster</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#06B6D4"></div><span class="legend-label">Write Path</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#8B5CF6"></div><span class="legend-label">Read Path</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#EF4444"></div><span class="legend-label">Storage</span></div>
  <span class="footer-hint">CLICK ANY NODE TO EXPLORE</span>
</footer>

<script>
const components = {
  client: {
    id: "client", label: "Client / Driver", icon: "⬡", color: "#00D4FF",
    position: { x: 50, y: 8 },
    description: "The application layer that communicates with Cassandra via official drivers (Java, Python, Node.js, etc.). Drivers are topology-aware — they maintain a local copy of the cluster metadata and route requests intelligently. They handle load balancing, retry policies, and connection pooling automatically.",
    details: ["Maintains cluster metadata locally", "Supports multiple consistency levels", "Handles automatic failover & retries", "Connection pooling per host"],
  },
  coordinator: {
    id: "coordinator", label: "Coordinator Node", icon: "◈", color: "#FF6B35",
    position: { x: 50, y: 26 },
    description: "Any node in the cluster can act as a coordinator for a given request. When a client sends a query, the coordinator receives it first. It determines which nodes own the relevant data (using the partition key), routes the request, collects responses, and returns the result to the client — all transparently.",
    details: ["Any node can become coordinator", "Routes requests to replica nodes", "Enforces consistency level", "Aggregates and returns responses"],
  },
  partitioner: {
    id: "partitioner", label: "Partitioner", icon: "⬡", color: "#A855F7",
    position: { x: 20, y: 44 },
    description: "The partitioner determines which node stores a given row by hashing the partition key into a token. Cassandra uses Murmur3Partitioner by default, producing a 64-bit hash. This token maps to a position on the ring, and the node responsible for that range receives the data.",
    details: ["Murmur3Partitioner (default)", "Hashes partition key → token", "Ensures even data distribution", "Token range per virtual node (vnode)"],
  },
  gossip: {
    id: "gossip", label: "Gossip Protocol", icon: "⟳", color: "#22C55E",
    position: { x: 80, y: 44 },
    description: "Gossip is Cassandra's peer-to-peer communication protocol for cluster state propagation. Every second, each node exchanges state information with up to 3 other nodes. This allows the cluster to detect failures, track node load, and propagate schema changes without a single point of failure.",
    details: ["Runs every ~1 second per node", "Detects node failures via heartbeats", "Propagates schema & topology changes", "Enables decentralized cluster awareness"],
  },
  ring: {
    id: "ring", label: "Token Ring / Cluster", icon: "○", color: "#F59E0B",
    position: { x: 50, y: 50 },
    description: "Cassandra organizes nodes in a logical ring. Each node is assigned one or more token ranges (via virtual nodes / vnodes). Data is distributed across the ring based on partition key hashes. Virtual nodes allow fine-grained load balancing and make adding/removing nodes seamless.",
    details: ["Logical ring of all cluster nodes", "Virtual nodes (vnodes) per physical node", "Default 256 vnodes per node", "No master / all nodes are equal"],
  },
  replication: {
    id: "replication", label: "Replication", icon: "⊞", color: "#EC4899",
    position: { x: 50, y: 68 },
    description: "Cassandra replicates data across multiple nodes for fault tolerance. The Replication Factor (RF) defines how many copies exist. SimpleStrategy assigns replicas to the next N nodes on the ring; NetworkTopologyStrategy places replicas rack/datacenter-aware, critical for multi-DC deployments.",
    details: ["Replication Factor (RF) = number of copies", "SimpleStrategy for single datacenter", "NetworkTopologyStrategy for multi-DC", "RF=3 is the standard recommendation"],
  },
  writepath: {
    id: "writepath", label: "Write Path", icon: "↓", color: "#06B6D4",
    position: { x: 20, y: 82 },
    description: "On a write, Cassandra first appends to the Commit Log (sequential disk write for durability), then writes to the Memtable (in-memory data structure). Once the Memtable exceeds a threshold, it's flushed to disk as an immutable SSTable. This makes Cassandra writes extremely fast — no random disk I/O.",
    details: ["1. Write to Commit Log (durability)", "2. Write to Memtable (in-memory)", "3. Memtable → flushed to SSTable", "All writes are sequential (fast!)"],
  },
  readpath: {
    id: "readpath", label: "Read Path", icon: "↑", color: "#8B5CF6",
    position: { x: 80, y: 82 },
    description: "Reads check the Memtable first, then a Bloom Filter (probabilistic check to skip irrelevant SSTables), then the Key Cache, and finally SSTables on disk. Since multiple SSTables may hold versions of the same row, Cassandra merges results using timestamps, returning the most recent data.",
    details: ["1. Check Memtable", "2. Bloom Filter (skip bad SSTables)", "3. Key Cache → SSTable lookup", "4. Merge by timestamp (MVCC)"],
  },
  compaction: {
    id: "compaction", label: "Compaction", icon: "⊟", color: "#EF4444",
    position: { x: 50, y: 92 },
    description: "Over time, SSTables accumulate. Compaction merges multiple SSTables into one, removing tombstones (deletes), resolving conflicts by timestamp, and reclaiming disk space. Strategies include STCS (default), LCS (for read-heavy workloads), and TWCS (for time-series data).",
    details: ["Merges SSTables → reduces read amplification", "Removes tombstones (logical deletes)", "STCS / LCS / TWCS strategies", "Runs in background automatically"],
  },
};

const flows = [
  { from: "client",       to: "coordinator", label: "Query",       color: "#00D4FF" },
  { from: "coordinator",  to: "partitioner", label: "Hash key",    color: "#FF6B35" },
  { from: "coordinator",  to: "gossip",      label: "Node state",  color: "#22C55E" },
  { from: "partitioner",  to: "ring",        label: "Token→Node",  color: "#A855F7" },
  { from: "gossip",       to: "ring",        label: "Topology",    color: "#22C55E" },
  { from: "ring",         to: "replication", label: "RF copies",   color: "#F59E0B" },
  { from: "replication",  to: "writepath",   label: "Write",       color: "#06B6D4" },
  { from: "replication",  to: "readpath",    label: "Read",        color: "#8B5CF6" },
  { from: "writepath",    to: "compaction",  label: "SSTables",    color: "#06B6D4" },
  { from: "readpath",     to: "compaction",  label: "Merge",       color: "#8B5CF6" },
];

let selected = "coordinator";
const diagram = document.getElementById("diagram");
const svg = document.getElementById("svg-arrows");
const panel = document.getElementById("detail-panel");

// Build SVG defs + paths
function buildSVG() {
  let defs = '<defs>';
  flows.forEach(f => {
    defs += `<marker id="arrow-${f.from}-${f.to}" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="${f.color}99"/>
    </marker>`;
  });
  defs += '</defs>';

  let paths = '';
  flows.forEach(f => {
    const from = components[f.from].position;
    const to   = components[f.to].position;
    const mx = (from.x + to.x) / 2;
    const my = (from.y + to.y) / 2;
    const dx = to.x - from.x;
    const dy = to.y - from.y;
    const cx = mx - dy * 0.12;
    const cy = my + dx * 0.12;
    const isActive = selected === f.from || selected === f.to;
    paths += `
      <path id="path-${f.from}-${f.to}"
        d="M ${from.x} ${from.y} Q ${cx} ${cy} ${to.x} ${to.y}"
        fill="none"
        stroke="${isActive ? f.color : f.color + '33'}"
        stroke-width="${isActive ? 0.5 : 0.3}"
        stroke-dasharray="${isActive ? '0' : '1.5,1.5'}"
        marker-end="url(#arrow-${f.from}-${f.to})"
        style="transition:all 0.3s ease"
      />
      <text id="label-${f.from}-${f.to}"
        x="${cx}" y="${cy - 1.2}"
        font-size="2.2" fill="${f.color}"
        text-anchor="middle"
        font-family="Space Mono,monospace"
        opacity="${isActive ? 0.9 : 0}"
        style="transition:opacity 0.3s"
      >${f.label}</text>`;
  });

  svg.innerHTML = defs + paths;
}

// Build node cards
function buildNodes() {
  Object.values(components).forEach(c => {
    const el = document.createElement("div");
    el.className = "node-card";
    el.id = "node-" + c.id;
    el.style.left = c.position.x + "%";
    el.style.top  = c.position.y + "%";

    const inner = document.createElement("div");
    inner.className = "node-inner";
    inner.style.borderColor = c.color + "55";

    inner.innerHTML = `
      <div class="node-icon">${c.icon}</div>
      <div class="node-label" style="color:#ccd6f6">${c.label}</div>
    `;

    el.appendChild(inner);
    el.addEventListener("click", () => selectNode(c.id));
    diagram.appendChild(el);
  });
}

function updateNodes() {
  Object.values(components).forEach(c => {
    const inner = document.querySelector(`#node-${c.id} .node-inner`);
    const icon  = document.querySelector(`#node-${c.id} .node-icon`);
    const label = document.querySelector(`#node-${c.id} .node-label`);
    const isSelected = selected === c.id;

    inner.style.background = isSelected
      ? `linear-gradient(135deg,${c.color}22,${c.color}44)`
      : "rgba(10,12,20,0.85)";
    inner.style.borderColor = isSelected ? c.color : c.color + "55";
    inner.style.boxShadow   = isSelected
      ? `0 0 24px ${c.color}66,0 0 6px ${c.color}33`
      : "0 2px 12px rgba(0,0,0,0.5)";
    inner.style.transform   = isSelected ? "scale(1.07)" : "scale(1)";
    icon.style.filter       = isSelected ? `drop-shadow(0 0 6px ${c.color})` : "none";
    label.style.color       = isSelected ? c.color : "#ccd6f6";
  });
}

function updateArrows() {
  flows.forEach(f => {
    const pathEl  = document.getElementById(`path-${f.from}-${f.to}`);
    const labelEl = document.getElementById(`label-${f.from}-${f.to}`);
    if (!pathEl) return;
    const isActive = selected === f.from || selected === f.to;
    pathEl.setAttribute("stroke", isActive ? f.color : f.color + "33");
    pathEl.setAttribute("stroke-width", isActive ? "0.5" : "0.3");
    pathEl.setAttribute("stroke-dasharray", isActive ? "0" : "1.5,1.5");
    if (labelEl) labelEl.setAttribute("opacity", isActive ? "0.9" : "0");
  });
}

function renderPanel() {
  if (!selected) {
    panel.innerHTML = `<div class="empty-state"><div style="font-size:40px">⬡</div><div>SELECT A COMPONENT</div></div>`;
    return;
  }
  const c = components[selected];

  const connectedFlows = flows.filter(f => f.from === selected || f.to === selected);
  const chips = connectedFlows.map(f => {
    const otherId = f.from === selected ? f.to : f.from;
    const other = components[otherId];
    return `<div class="conn-chip" style="border-color:${other.color}44;color:${other.color};background:${other.color}11" onclick="selectNode('${otherId}')">${other.label}</div>`;
  }).join("");

  const charItems = c.details.map(d =>
    `<div class="char-item" style="background:${c.color}09;border-color:${c.color}22">
      <span class="char-arrow" style="color:${c.color}">▸</span>${d}
    </div>`
  ).join("");

  panel.innerHTML = `
    <div>
      <div class="detail-header">
        <div class="detail-icon-box" style="background:linear-gradient(135deg,${c.color}22,${c.color}11);border-color:${c.color}66;box-shadow:0 0 16px ${c.color}33">
          ${c.icon}
        </div>
        <div>
          <div class="detail-name" style="color:${c.color}">${c.label}</div>
          <div class="detail-sub">COMPONENT DETAIL</div>
        </div>
      </div>
      <div class="detail-divider" style="background:linear-gradient(90deg,${c.color}44,transparent)"></div>
    </div>

    <p id="detail-description">${c.description}</p>

    <div>
      <div class="chars-label" style="color:${c.color}99">KEY CHARACTERISTICS</div>
      <div id="detail-chars">${charItems}</div>
    </div>

    <div>
      <div class="connections-label">CONNECTED TO</div>
      <div id="detail-connections">${chips}</div>
    </div>
  `;
}

function selectNode(id) {
  selected = selected === id ? null : id;
  updateNodes();
  updateArrows();
  renderPanel();
}

// Animated status dots
let dotIdx = 0;
setInterval(() => {
  document.querySelectorAll(".dot").forEach((d, i) => {
    d.classList.toggle("active", i === dotIdx);
  });
  dotIdx = (dotIdx + 1) % 3;
}, 500);

// Init
buildSVG();
buildNodes();
updateNodes();
renderPanel();
</script>
</body>
</html>
